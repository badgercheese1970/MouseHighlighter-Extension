<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 11px;
    }
    label { color: #444; }
    .val {
      min-width: 40px;
      text-align: right;
      color: #888;
      font-size: 12px;
    }
    input[type=range] {
      width: 110px;
      accent-color: #f5a623;
    }
    input[type=color] {
      width: 44px;
      height: 26px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      padding: 1px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 10px;
      border-bottom: 1px solid #eee;
      margin-bottom: 12px;
    }
    .toggle-label { font-weight: 500; }
    /* Simple toggle switch */
    .switch { position: relative; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 20px;
      cursor: pointer; transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #f5a623; }
    input:checked + .slider::before { transform: translateX(16px); }
    .hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 10px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h2>🖱 Mouse Highlighter</h2>

  <div class="toggle-row">
    <span class="toggle-label">Enabled</span>
    <label class="switch">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <label>Circle size</label>
    <input type="range" id="circleSize" min="40" max="300" value="120">
    <span class="val" id="circleSizeVal">120px</span>
  </div>

  <div class="row">
    <label>Sensitivity</label>
    <input type="range" id="sensitivity" min="10" max="100" value="50">
    <span class="val" id="sensitivityVal">50</span>
  </div>

  <div class="row">
    <label>Fade delay</label>
    <input type="range" id="fadeDelay" min="500" max="5000" step="100" value="1500">
    <span class="val" id="fadeDelayVal">1.5s</span>
  </div>

  <div class="row">
    <label>Colour</label>
    <input type="color" id="color" value="#ffd700">
  </div>

  <p class="hint">Jiggle your mouse to show the highlight. Works in Google Meet, Zoom and Teams tab and window sharing.</p>

  <script src="popup.js"></script>
</body>
</html>
